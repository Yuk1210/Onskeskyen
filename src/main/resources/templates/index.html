<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeskyen</title>
    <link rel="stylesheet" href="/style.css" th:href="@{/style.css}">
</head>
<body>
<header>
    <div class="top-bar">
        <h1>Velkommen til Julemande </h1>
    </div>
</header>

<nav>
    <a href="/om-os" th:href="@{/om-os}">Om os</a>
    <a href="/kontakt" th:href="@{/kontakt}">Kontakt</a>

    <!-- LOGGED OUT -->
    <a th:if="${session.brugerId == null}" href="/login" class="login-btn">
        Login
    </a>

    <!-- LOGGED IN -->
    <a th:if="${session.brugerId != null}" href="/profil">
        Profil
    </a>

    <!-- LOGOUT -->
    <div class="nav-right">
        <form action="/logout" method="post" class="logout-form">
            <button type="submit" class="nav-link-btn">Log ud</button>
        </form>
    </div>
</nav>

<main>
    <section class="box">
        <h2>Mine ønsker</h2>
        <p>Her kan brugeren hurtigt få overblik over sine ønsker.</p>
    </section>

    <section class="box">
        <h2>Opret nyt ønske</h2>
        <p>En enkel boks hvor man nemt kan tilføje nye ønsker.</p>
    </section>

    <section class="box">
        <h2>Populære ønsker</h2>
        <p>Viser udvalgte eller ofte brugte ønsker på en enkel måde.</p>
    </section>
</main>

<footer>
    <p>&copy; 2026 Ønskeskyen</p>
</footer>
</body>
</html>
