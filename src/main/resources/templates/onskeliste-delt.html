<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delt ønskeliste</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<header>
    <div class="top-bar">
        <h1>Ønskeskyen</h1>
    </div>
</header>

<nav class="main-nav">
    <div class="nav-left">
        <a href="/" class="nav-link">Forside</a>
        <a href="/login" class="nav-link">Login</a>
    </div>

    <div class="nav-right" th:if="${erLoggetInd}">
        <form action="/logout" method="post" class="logout-form">
            <button type="submit" class="nav-link-btn">Log ud</button>
        </form>
    </div>
</nav>

<main>
    <section class="box">
        <h2 th:text="${onskeliste.titel}">Ønskeliste</h2>
        <p th:text="${onskeliste.beskrivelse}">Beskrivelse</p>
    </section>

    <section class="box" th:if="${success}">
        <p style="color: green;" th:text="${success}"></p>
    </section>

    <section class="box" th:if="${fejl}">
        <p style="color: red;" th:text="${fejl}"></p>
    </section>

    <section class="box">
        <h2>Ønsker</h2>

        <p th:if="${#lists.isEmpty(onsker)}">Der er ingen ønsker på denne liste endnu.</p>

        <ul class="wish-list">
            <li th:each="onske : ${onsker}" class="available">

                <span class="wish-title" th:text="${onske.navn}">Navn</span>

                <div class="wish-meta" th:if="${onske.beskrivelse != null and !#strings.isEmpty(onske.beskrivelse)}">
                    Beskrivelse: <span th:text="${onske.beskrivelse}"></span>
                </div>

                <div class="wish-meta">
                    Pris: <span th:text="${onske.pris}">0</span> kr.
                </div>

                <div class="wish-meta" th:if="${onske.produktLink != null and !#strings.isEmpty(onske.produktLink)}">
                    <a th:href="${onske.produktLink}" target="_blank">Køb produkt</a>
                </div>

                <div class="wish-meta" th:if="${onske.billedeLink != null and !#strings.isEmpty(onske.billedeLink)}">
                    <img th:src="${onske.billedeLink}" alt="Produktbillede" style="max-width: 140px; border-radius: 8px;">
                </div>

                <span th:if="${onske.kobt}" class="status status-booked">Købt</span>

                <span th:if="${!onske.kobt and reservationer.containsKey(onske.onskeId)}" class="status status-booked">
                    Reserveret
                </span>

                <span th:if="${!onske.kobt and !reservationer.containsKey(onske.onskeId)}" class="status status-free">
                    Ledig
                </span>

                <div th:if="${!erLoggetInd and !onske.kobt}">
                    <p>Log ind for at reservere dette ønske.</p>
                </div>

                <div th:if="${erLoggetInd and erEjer and !onske.kobt}">
                    <p>Du kan ikke reservere dine egne ønsker.</p>
                </div>

                <div th:if="${erLoggetInd and !erEjer and !onske.kobt and !reservationer.containsKey(onske.onskeId)}">
                    <form th:action="@{/reservationer/{onskeId}(onskeId=${onske.onskeId})}" method="post">
                        <button type="submit" class="login-btn">Reservér</button>
                    </form>
                </div>

                <div th:if="${erLoggetInd and !erEjer and reservationer.containsKey(onske.onskeId) and reservationer.get(onske.onskeId).brugerId == brugerId and !onske.kobt}"
                     style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">

                    <form th:action="@{/reservationer/{onskeId}/annuller(onskeId=${onske.onskeId})}" method="post">
                        <button type="submit" class="nav-link-btn">Annuller reservation</button>
                    </form>

                    <form th:action="@{/onsker/{onskeId}/kobt(onskeId=${onske.onskeId})}" method="post">
                        <button type="submit" class="login-btn">Marker som købt</button>
                    </form>
                </div>

            </li>
        </ul>
    </section>
</main>

<footer>
    <p>&copy; 2026 Ønskeskyen</p>
</footer>

</body>
</html>
