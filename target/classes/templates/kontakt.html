<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Julemanden</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<header>
    <div class="top-bar">
        <h1>Skriv til Julemandens Værksted ✉</h1>
    </div>
</header>

<nav class="main-nav">
    <div class="nav-left">
        <a th:href="@{/}" class="nav-link">Forside</a>
        <a th:href="@{/om-os}" class="nav-link">Om os</a>
        <a th:href="@{/kontakt}" class="nav-link">Kontakt</a>

        <a th:if="${session.brugerId != null}" th:href="@{/profil}" class="nav-link">
            Profil
        </a>
    </div>

    <div class="nav-right">
        <a th:if="${session.brugerId == null}" th:href="@{/login}" class="login-btn">
            Login
        </a>

        <form th:if="${session.brugerId != null}" th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="nav-link-btn">Log ud</button>
        </form>
    </div>
</nav>

<main>
    <section class="box">
        <h2>Send en nissepost </h2>

        <form th:action="@{/kontakt}" method="POST">
            <p>
                <label for="name"><strong>Dit Navn:</strong></label><br>
                <input type="text" id="name" name="name" required class="form-input">
            </p>

            <p>
                <label for="email"><strong>Din E-mail:</strong></label><br>
                <input type="email" id="email" name="email" required class="form-input">
            </p>

            <p>
                <label for="message"><strong>Besked:</strong></label><br>
                <textarea id="message" name="message" rows="4" required class="form-input"></textarea>
            </p>

            <p>
                <button type="submit" class="nav-link-btn">
                    Send
                </button>
            </p>
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 Ønskeskyen</p>
</footer>

</body>
</html>
