<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ønskeliste</title>
    <link rel="stylesheet" th:href="@{/Style-detalje.css}">
</head>
<body>

<header>
    <div class="top-bar">
        <h1>Ønskeskyen</h1>
    </div>
</header>

<nav class="main-nav">
    <div class="nav-left">
        <a th:href="@{/}" class="nav-link">Forside</a>
        <a th:href="@{/profil}" class="nav-link">Profil</a>
        <a th:href="@{/onskelister}" class="nav-link active">Tilbage</a>
    </div>

    <div class="nav-right">
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="nav-link-btn logout">Log ud</button>
        </form>
    </div>
</nav>

<main>
    <section class="box full-width">
        <h2 th:text="${onskeliste.titel}">Ønskeliste</h2>
        <p th:text="${onskeliste.beskrivelse}">Beskrivelse</p>

        <p th:if="${onskeliste.offentlig and onskeliste.delingslink != null and !#strings.isEmpty(onskeliste.delingslink)}">
            Delingslink:
            <a th:href="${onskeliste.delingslink}" th:text="${onskeliste.delingslink}" target="_blank" class="product-link"></a>
        </p>
    </section>

    <section class="box">
        <h2>Tilføj ønske</h2>

        <form th:action="@{/onskelister/{id}/tilfoej-onske(id=${onskeliste.onskelisteId})}" method="post" class="wish-form">
            <input type="text" name="navn" placeholder="Navn" required class="form-input">
            <input type="text" name="beskrivelse" placeholder="Beskrivelse" class="form-input">
            <input type="text" name="produktLink" placeholder="Produkt link" class="form-input">
            <input type="number" step="0.01" name="pris" placeholder="Pris" class="form-input">
            <input type="text" name="billedeLink" placeholder="Billede link" class="form-input">

            <button type="submit" class="action-btn green-btn">Tilføj</button>
        </form>
    </section>

    <section class="box">
        <h2>Ønsker</h2>

        <p th:if="${#lists.isEmpty(onsker)}">Der er ingen ønsker endnu.</p>

        <ul class="wish-list" th:if="${!#lists.isEmpty(onsker)}">
            <li th:each="onske : ${onsker}" th:class="${onske.kobt} ? 'booked' : 'available'">

                <span class="wish-title" th:text="${onske.navn}">Navn</span>

                <div class="wish-meta" th:if="${onske.beskrivelse != null and !#strings.isEmpty(onske.beskrivelse)}">
                    Beskrivelse: <span th:text="${onske.beskrivelse}"></span>
                </div>

                <div class="wish-meta">
                    Pris: <span th:text="${onske.pris}">0</span> kr.
                </div>

                <div class="wish-meta" th:if="${onske.produktLink != null and !#strings.isEmpty(onske.produktLink)}">
                    <a th:href="${onske.produktLink}" target="_blank" class="product-link">Se produkt</a>
                </div>

                <div class="wish-meta" th:if="${onske.billedeLink != null and !#strings.isEmpty(onske.billedeLink)}">
                    <img th:src="${onske.billedeLink}" alt="Produktbillede" class="product-image">
                </div>

                <span th:if="${onske.kobt}" class="status status-booked">Købt</span>
                <span th:if="${!onske.kobt}" class="status status-free">Ledig</span>

                <div class="action-row">
                    <form th:action="@{/onsker/{id}/slet(id=${onske.onskeId})}" method="post" class="inline-form">
                        <button type="submit" class="action-btn delete-btn">Slet</button>
                    </form>
                </div>
            </li>
        </ul>
    </section>
</main>

<footer>
    <p>&copy; 2026 Ønskeskyen</p>
</footer>

</body>
</html>
