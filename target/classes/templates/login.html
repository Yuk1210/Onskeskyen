<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/styles_Login.css">
</head>

<body>

<div class="login-box">

    <!-- REGISTER FORM -->
    <form id="register" action="/opret" method="post">
        <h2>Opret bruger</h2>

        <!-- FEJL BESKED -->
        <p th:if="${fejl}" th:text="${fejl}" style="color: red;"></p>

        <div class="input-box">
            <input type="text" name="navn" placeholder="Navn" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" name="kodeord" placeholder="Adgangskode" required>
        </div>

        <button type="submit">Opret</button>

        <div class="register-link">
            <p>Har du allerede en konto?
                <a href="#">Login</a>
            </p>
        </div>
    </form>

    <!-- LOGIN FORM -->
    <form id="login" action="/login" method="post">
        <h2>Login</h2>

        <!-- FEJL BESKED -->
        <p th:if="${fejl}" th:text="${fejl}" style="color: red;"></p>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" name="kodeord" placeholder="Adgangskode" required>
        </div>

        <button type="submit">Login</button>

        <div class="register-link">
            <p>Har du ikke en konto?
                <a href="#register">Opret bruger</a>
            </p>
        </div>
    </form>

</div>

</body>
</html>
