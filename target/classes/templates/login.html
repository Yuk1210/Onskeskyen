<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Link til CSS fil -->
    <link rel="stylesheet" href="styles_Login.css">
</head>

<body>

<div class="login-box">

    <!-- REGISTER FORM -->
    <form id="register">
        <h2>Opret bruger</h2>

        <div class="input-box">
            <input type="text" placeholder="Navn" required>
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Adgangskode" required>
        </div>

        <button type="submit">Opret</button>

        <div class="register-link">
            <p>Har du allerede en konto?
                <a href="#">Login</a>
            </p>
        </div>
    </form>

    <!-- LOGIN FORM -->
    <form id="login">
        <h2>Login</h2>

        <div class="input-box">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Adgangskode" required>
        </div>

        <button type="submit">Login</button>

        <div class="register-link">
            <p>Har du ikke en konto?
                <a href="#register">Opret bruger</a>
            </p>
        </div>
    </form>

</div>

</body>
</html>
